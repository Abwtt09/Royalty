<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
    />
    <link
      rel="modulepreload"
      href="https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js"
    />
    <link
      rel="modulepreload"
      href="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js"
    />
    <link
      rel="modulepreload"
      href="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js"
    />
    <link rel="modulepreload" href="assets/js/firebase-config.js" />
    <link rel="modulepreload" href="assets/js/auth.js" />
    <link rel="modulepreload" href="assets/js/i18n.js" />
    <link rel="modulepreload" href="assets/js/ui.js?v=2" />
    <title>قواعد البيانات · Royalty Real Estate</title>
    <link rel="icon" href="assets/img/favicon.png" type="image/png" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/dashboard.css" />
  </head>
  <body>
    <div id="sidebar"></div>

    <main class="dashboard-main">
      <header class="dashboard-header">
        <div class="dashboard-header-split">
          <div>
            <p class="eyebrow" data-i18n="db.eyebrow"></p>
            <h1 data-i18n="db.title"></h1>
            <p data-i18n="db.description"></p>
          </div>
          <button
            class="btn btn-primary"
            id="createDbBtn"
            data-role-require="db.create"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            <span data-i18n="db.createBtn"></span>
          </button>
        </div>
      </header>

      <!-- Skeleton loading -->
      <div id="dbLoading" class="db-skeleton-grid">
        <div class="db-skeleton-card">
          <div
            class="skeleton-line"
            style="height: 2.75rem; width: 2.75rem; border-radius: 0.75rem"
          ></div>
          <div
            class="skeleton-line"
            style="height: 1rem; margin-top: 0.5rem"
          ></div>
          <div
            class="skeleton-line"
            style="height: 0.75rem; width: 70%; margin-top: 0.375rem"
          ></div>
        </div>
        <div class="db-skeleton-card">
          <div
            class="skeleton-line"
            style="height: 2.75rem; width: 2.75rem; border-radius: 0.75rem"
          ></div>
          <div
            class="skeleton-line"
            style="height: 1rem; margin-top: 0.5rem"
          ></div>
          <div
            class="skeleton-line"
            style="height: 0.75rem; width: 55%; margin-top: 0.375rem"
          ></div>
        </div>
        <div class="db-skeleton-card">
          <div
            class="skeleton-line"
            style="height: 2.75rem; width: 2.75rem; border-radius: 0.75rem"
          ></div>
          <div
            class="skeleton-line"
            style="height: 1rem; margin-top: 0.5rem"
          ></div>
          <div
            class="skeleton-line"
            style="height: 0.75rem; width: 80%; margin-top: 0.375rem"
          ></div>
        </div>
      </div>

      <!-- Database cards grid -->
      <div id="dbGrid" class="db-grid" style="display: none"></div>

      <!-- Empty state -->
      <div id="dbEmpty" class="db-empty" style="display: none">
        <div class="db-empty-icon" id="dbEmptyIcon"></div>
        <h3 data-i18n="db.emptyTitle"></h3>
        <p data-i18n="db.emptyHint"></p>
        <button
          class="btn btn-primary"
          id="createDbEmptyBtn"
          data-role-require="db.create"
        >
          <span data-i18n="db.createFirst"></span>
        </button>
      </div>
    </main>

    <!-- Create / Edit Database Modal -->
    <div id="dbModal" class="modal-backdrop hidden">
      <div class="modal" style="max-width: 32rem">
        <button class="modal-close" id="dbModalClose" aria-label="Close">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
        <h3 id="dbModalTitle"></h3>
        <form
          id="dbForm"
          style="
            margin-top: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
          "
        >
          <div class="field-group">
            <label class="field-label" data-i18n="db.iconLabel"></label>
            <div class="db-icon-picker" id="dbIconPicker"></div>
            <input
              type="hidden"
              id="dbIconValue"
              name="icon"
              value="database"
            />
          </div>
          <div class="field-group">
            <label class="field-label" data-i18n="db.nameLabel"></label>
            <input
              class="field-input"
              type="text"
              name="name"
              id="dbNameInput"
              required
              data-i18n-placeholder="db.namePlaceholder"
            />
          </div>
          <div class="field-group">
            <label class="field-label" data-i18n="db.descLabel"></label>
            <textarea
              class="field-input"
              name="description"
              id="dbDescInput"
              rows="2"
              data-i18n-placeholder="db.descPlaceholder"
              style="resize: vertical"
            ></textarea>
          </div>
          <div class="field-group">
            <label class="field-label" data-i18n="db.categoryLabel"></label>
            <input
              class="field-input"
              type="text"
              name="category"
              id="dbCategoryInput"
              data-i18n-placeholder="db.categoryPlaceholder"
            />
          </div>
          <p class="field-error hidden" id="dbFormError"></p>
          <div class="modal-actions">
            <button
              type="button"
              class="btn btn-ghost"
              id="dbModalCancel"
              data-i18n="dashboard.cancel"
            ></button>
            <button type="submit" class="btn btn-primary" id="dbSaveBtn">
              <span
                class="spinner hidden"
                id="dbSaveSpinner"
                style="width: 0.9rem; height: 0.9rem; border-width: 2px"
              ></span>
              <span id="dbSaveLabel" data-i18n="db.saveDb"></span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div id="dbDeleteModal" class="modal-backdrop hidden">
      <div class="modal" style="max-width: 28rem">
        <button class="modal-close" id="dbDeleteModalClose" aria-label="Close">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
        <h3 id="dbDeleteName" style="margin-bottom: 0.75rem"></h3>
        <p
          style="font-size: 0.9375rem; color: var(--ink-600)"
          data-i18n="db.deleteConfirmMsg"
        ></p>
        <p
          class="field-error hidden"
          id="dbDeleteError"
          style="margin-top: 0.75rem"
        ></p>
        <div class="modal-actions">
          <button
            class="btn btn-ghost"
            id="dbDeleteCancel"
            data-i18n="dashboard.cancel"
          ></button>
          <button class="btn btn-danger" id="dbDeleteConfirmBtn">
            <span
              class="spinner hidden"
              id="dbDeleteSpinner"
              style="width: 0.9rem; height: 0.9rem; border-width: 2px"
            ></span>
            <span id="dbDeleteLabel" data-i18n="db.deleteDb"></span>
          </button>
        </div>
      </div>
    </div>

    <script type="module">
      import {
        initI18n,
        applyTranslations,
        t,
        getLang,
        onLangChange,
      } from "./assets/js/i18n.js";
      import {setupDashboard, toast} from "./assets/js/dashboard-ui.js";
      import {escapeHtml, formatDate} from "./assets/js/ui.js?v=2";
      import {
        createDatabase,
        listDatabases,
        updateDatabase,
        deleteDatabase,
      } from "./assets/js/databases-firestore.js";
      import {DB_ICONS, renderDbIcon} from "./assets/js/db-icons.js";

      initI18n();

      let currentUserId = null;
      let databases = [];
      let editingDbId = null;
      let deletingDbId = null;

      /* ── Icon picker ── */
      function buildIconPicker() {
        const picker = document.getElementById("dbIconPicker");
        picker.innerHTML = Object.keys(DB_ICONS)
          .map(
            (key) => `
          <button type="button" class="db-icon-opt" data-icon="${key}" title="${key}">
            ${renderDbIcon(key, 18)}
          </button>
        `,
          )
          .join("");
        picker.querySelectorAll(".db-icon-opt").forEach((btn) => {
          btn.addEventListener("click", () => {
            picker
              .querySelectorAll(".db-icon-opt")
              .forEach((b) => b.classList.remove("selected"));
            btn.classList.add("selected");
            document.getElementById("dbIconValue").value = btn.dataset.icon;
          });
        });
        setPickerIcon("database");
      }

      function setPickerIcon(icon) {
        const key = DB_ICONS[icon] ? icon : "database";
        const picker = document.getElementById("dbIconPicker");
        picker.querySelectorAll(".db-icon-opt").forEach((b) => {
          b.classList.toggle("selected", b.dataset.icon === key);
        });
        document.getElementById("dbIconValue").value = key;
      }

      /* ── Render cards ── */
      function renderCard(dbObj) {
        const rc = dbObj.recordCount ?? 0;
        const fc = (dbObj.fields || []).length;
        const created = dbObj.createdAt
          ? new Date(dbObj.createdAt).toLocaleDateString()
          : "—";
        const updated = dbObj.updatedAt
          ? new Date(dbObj.updatedAt).toLocaleDateString()
          : created;
        return `
          <div class="db-card">
            <div class="db-card-header">
              <div class="db-icon-badge">${renderDbIcon(dbObj.icon || "database", 22)}</div>
              <div class="db-card-meta">
                <p class="db-card-name">${escapeHtml(dbObj.name)}</p>
                ${dbObj.description ? `<p class="db-card-desc">${escapeHtml(dbObj.description)}</p>` : ""}
                ${dbObj.category ? `<p class="db-card-category">${escapeHtml(dbObj.category)}</p>` : ""}
              </div>
              <div class="db-card-menu">
                <button class="icon-btn db-edit-btn" data-db-id="${dbObj.id}" title="${escapeHtml(t("db.editSettings"))}">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="icon-btn danger db-delete-btn" data-db-id="${dbObj.id}" title="${escapeHtml(t("db.deleteDb"))}">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                </button>
              </div>
            </div>
            <div class="db-card-stats">
              <div class="db-stat"><strong>${rc}</strong>${t("db.records")}</div>
              <div class="db-stat"><strong>${fc}</strong>${t("db.fields")}</div>
              <div class="db-stat"><strong>${created}</strong>${t("db.created")}</div>
              <div class="db-stat"><strong>${updated}</strong>${t("db.updated")}</div>
            </div>
            <div class="db-card-actions">
              <a href="dashboard-database-view.html?db=${encodeURIComponent(dbObj.id)}" class="btn btn-primary btn-sm" style="flex:1;justify-content:center;">${t("db.openDb")}</a>
            </div>
          </div>`;
      }

      function renderGrid() {
        const grid = document.getElementById("dbGrid");
        const empty = document.getElementById("dbEmpty");
        document.getElementById("dbLoading").style.display = "none";
        if (!databases.length) {
          grid.style.display = "none";
          empty.style.display = "flex";
          return;
        }
        grid.innerHTML = databases.map(renderCard).join("");
        grid.style.display = "grid";
        empty.style.display = "none";

        grid.querySelectorAll(".db-edit-btn").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            openEditModal(btn.dataset.dbId);
          });
        });
        grid.querySelectorAll(".db-delete-btn").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            openDeleteModal(btn.dataset.dbId);
          });
        });
      }

      async function loadDatabases() {
        try {
          databases = await listDatabases();
          renderGrid();
        } catch (e) {
          document.getElementById("dbLoading").style.display = "none";
          toast(t("common.error") + ": " + e.message);
        }
      }

      /* ── Create / Edit modal ── */
      function openCreateModal() {
        editingDbId = null;
        document.getElementById("dbModalTitle").textContent =
          t("db.createTitle");
        document.getElementById("dbForm").reset();
        document.getElementById("dbFormError").classList.add("hidden");
        setPickerIcon("database");
        document.getElementById("dbModal").classList.remove("hidden");
        document.getElementById("dbNameInput").focus();
        applyTranslations(document.getElementById("dbModal"));
      }

      function openEditModal(dbId) {
        const dbObj = databases.find((d) => d.id === dbId);
        if (!dbObj) return;
        editingDbId = dbId;
        document.getElementById("dbModalTitle").textContent = t("db.editTitle");
        document.getElementById("dbNameInput").value = dbObj.name || "";
        document.getElementById("dbDescInput").value = dbObj.description || "";
        document.getElementById("dbCategoryInput").value = dbObj.category || "";
        document.getElementById("dbFormError").classList.add("hidden");
        setPickerIcon(dbObj.icon || "database");
        document.getElementById("dbModal").classList.remove("hidden");
        document.getElementById("dbNameInput").focus();
        applyTranslations(document.getElementById("dbModal"));
      }

      function closeDbModal() {
        document.getElementById("dbModal").classList.add("hidden");
        editingDbId = null;
      }

      document
        .getElementById("dbModalClose")
        .addEventListener("click", closeDbModal);
      document
        .getElementById("dbModalCancel")
        .addEventListener("click", closeDbModal);
      document.getElementById("dbModal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("dbModal")) closeDbModal();
      });

      document
        .getElementById("dbForm")
        .addEventListener("submit", async (ev) => {
          ev.preventDefault();
          const form = ev.currentTarget;
          const spinner = document.getElementById("dbSaveSpinner");
          const label = document.getElementById("dbSaveLabel");
          const errEl = document.getElementById("dbFormError");
          const btn = document.getElementById("dbSaveBtn");
          errEl.classList.add("hidden");
          btn.setAttribute("disabled", "");
          spinner.classList.remove("hidden");
          label.textContent = t("common.loading");

          const data = {
            name: form.elements.name.value.trim(),
            description: form.elements.description.value.trim(),
            category: form.elements.category.value.trim(),
            icon: document.getElementById("dbIconValue").value,
          };

          try {
            if (editingDbId) {
              await updateDatabase(editingDbId, data);
              toast(t("dashboard.save") || "Saved");
            } else {
              await createDatabase(data, currentUserId);
              toast(t("db.createBtn").replace("+ ", "") + " ✓");
            }
            closeDbModal();
            await loadDatabases();
          } catch (e) {
            errEl.textContent = t("common.error") + ": " + e.message;
            errEl.classList.remove("hidden");
          } finally {
            btn.removeAttribute("disabled");
            spinner.classList.add("hidden");
            label.textContent = t("db.saveDb");
          }
        });

      /* ── Delete modal ── */
      function openDeleteModal(dbId) {
        const dbObj = databases.find((d) => d.id === dbId);
        if (!dbObj) return;
        deletingDbId = dbId;
        document.getElementById("dbDeleteName").textContent = dbObj.name;
        document.getElementById("dbDeleteError").classList.add("hidden");
        document.getElementById("dbDeleteModal").classList.remove("hidden");
        applyTranslations(document.getElementById("dbDeleteModal"));
      }

      function closeDeleteModal() {
        document.getElementById("dbDeleteModal").classList.add("hidden");
        deletingDbId = null;
      }

      document
        .getElementById("dbDeleteModalClose")
        .addEventListener("click", closeDeleteModal);
      document
        .getElementById("dbDeleteCancel")
        .addEventListener("click", closeDeleteModal);
      document
        .getElementById("dbDeleteModal")
        .addEventListener("click", (e) => {
          if (e.target === document.getElementById("dbDeleteModal"))
            closeDeleteModal();
        });

      document
        .getElementById("dbDeleteConfirmBtn")
        .addEventListener("click", async () => {
          if (!deletingDbId) return;
          const spinner = document.getElementById("dbDeleteSpinner");
          const label = document.getElementById("dbDeleteLabel");
          const errEl = document.getElementById("dbDeleteError");
          const btn = document.getElementById("dbDeleteConfirmBtn");
          errEl.classList.add("hidden");
          btn.setAttribute("disabled", "");
          spinner.classList.remove("hidden");
          label.textContent = t("dashboard.deleting");
          try {
            await deleteDatabase(deletingDbId);
            closeDeleteModal();
            toast(t("db.deleteDb") + " ✓");
            await loadDatabases();
          } catch (e) {
            errEl.textContent = t("common.error") + ": " + e.message;
            errEl.classList.remove("hidden");
          } finally {
            btn.removeAttribute("disabled");
            spinner.classList.add("hidden");
            label.textContent = t("db.deleteDb");
          }
        });

      /* ── Wire create buttons ── */
      document
        .getElementById("createDbBtn")
        .addEventListener("click", openCreateModal);
      document
        .getElementById("createDbEmptyBtn")
        .addEventListener("click", openCreateModal);

      /* ── Re-render on lang change ── */
      onLangChange(() => {
        renderGrid();
        applyTranslations();
      });

      /* ── Bootstrap ── */
      buildIconPicker();
      document.getElementById("dbEmptyIcon").innerHTML = renderDbIcon(
        "database",
        56,
      );
      (async () => {
        const ctx = await setupDashboard("dashboard-databases.html", {
          require: "db.view",
        });
        currentUserId = ctx.user.uid;
        await loadDatabases();
        applyTranslations();
      })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
    <script src="assets/js/animations.js"></script>
  </body>
</html>
