<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
    <link
      rel="preconnect"
      href="https://firestore.googleapis.com"
      crossorigin
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
    />
    <link
      rel="modulepreload"
      href="https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js"
    />
    <link
      rel="modulepreload"
      href="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js"
    />
    <link
      rel="modulepreload"
      href="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js"
    />
    <link rel="modulepreload" href="assets/js/firebase-config.js" />
    <link rel="modulepreload" href="assets/js/auth.js" />
    <link rel="modulepreload" href="assets/js/firestore.js" />
    <link rel="modulepreload" href="assets/js/i18n.js" />
    <link rel="modulepreload" href="assets/js/ui.js?v=2" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <title>تفاصيل العقار · الملكية للإستثمار</title>
    <link rel="icon" href="assets/img/favicon.png" type="image/png" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/dashboard.css" />
    <style>
      /* ── Property View ─────────────────────────────────────── */
      .pv-back {
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        font-size: 0.8rem;
        color: var(--ink-500);
        text-decoration: none;
        margin-bottom: 0.5rem;
        transition: color 0.15s;
      }
      .pv-back:hover {
        color: var(--ink-900);
      }

      .pv-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .pv-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 0.5rem;
        color: var(--ink-900);
        line-height: 1.3;
      }
      .pv-status-row {
        display: flex;
        gap: 0.375rem;
        flex-wrap: wrap;
      }
      .pv-header-actions {
        display: flex;
        gap: 0.5rem;
        align-items: flex-start;
        padding-top: 0.25rem;
      }

      /* ── Gallery ─────────────────────────────────────── */
      .pv-gallery {
        margin-bottom: 1.25rem;
      }
      .pv-gallery-main {
        aspect-ratio: 16/9;
        border-radius: 12px;
        overflow: hidden;
        background: var(--ink-100);
        position: relative;
      }
      .pv-gallery-main img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .pv-no-img {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 0.5rem;
        color: var(--ink-400);
      }
      .pv-no-img span {
        font-size: 0.8125rem;
      }

      .pv-thumbs {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.625rem;
        overflow-x: auto;
        padding-bottom: 4px;
        scrollbar-width: thin;
      }
      .pv-thumb {
        width: 78px;
        height: 58px;
        border-radius: 7px;
        object-fit: cover;
        cursor: pointer;
        border: 2.5px solid transparent;
        flex-shrink: 0;
        opacity: 0.7;
        transition:
          opacity 0.15s,
          border-color 0.15s;
      }
      .pv-thumb.active {
        border-color: var(--gold, #b8922a);
        opacity: 1;
      }
      .pv-thumb:hover {
        opacity: 1;
      }

      /* ── Layout ─────────────────────────────────────── */
      .pv-layout {
        display: grid;
        grid-template-columns: 1fr 340px;
        gap: 1.25rem;
        align-items: start;
      }
      @media (max-width: 920px) {
        .pv-layout {
          grid-template-columns: 1fr;
        }
        .pv-aside {
          order: -1;
        }
      }

      /* ── Card ─────────────────────────────────────── */
      .pv-card {
        background: var(--surface, #fff);
        border: 1px solid var(--ink-200);
        border-radius: 12px;
        padding: 1.125rem 1.25rem;
        margin-bottom: 0.875rem;
      }
      .pv-card:last-child {
        margin-bottom: 0;
      }
      .pv-card-ttl {
        font-size: 0.6875rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--ink-500);
        margin: 0 0 0.875rem;
      }

      /* Price */
      .pv-price {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        margin-bottom: 0.875rem;
      }
      .pv-price .omr-symbol {
        width: 1.25rem;
        height: 0.8rem;
        fill: var(--ink-800);
      }
      .pv-price .num {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--ink-900);
      }
      .pv-no-price {
        font-size: 0.8125rem;
        color: var(--ink-500);
        margin-bottom: 0.875rem;
      }

      /* Specs */
      .pv-specs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        margin-top: 0.25rem;
      }
      .pv-spec {
        background: var(--ink-50, #f8f8f5);
        border-radius: 8px;
        padding: 0.625rem 0.75rem;
      }
      .pv-spec-lbl {
        font-size: 0.6875rem;
        color: var(--ink-500);
        margin-bottom: 0.125rem;
      }
      .pv-spec-val {
        font-size: 0.9375rem;
        font-weight: 600;
        color: var(--ink-900);
      }

      /* Location */
      .pv-loc {
        display: flex;
        align-items: flex-start;
        gap: 0.5rem;
        font-size: 0.875rem;
        color: var(--ink-700);
        line-height: 1.55;
      }
      .pv-loc svg {
        flex-shrink: 0;
        margin-top: 0.15rem;
        color: var(--ink-400);
      }

      /* Map */
      .pv-map-wrap {
        height: 250px;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid var(--ink-200);
      }
      .pv-map-wrap iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }

      /* Description */
      .pv-desc {
        font-size: 0.9375rem;
        color: var(--ink-700);
        line-height: 1.8;
        white-space: pre-wrap;
        margin: 0;
      }

      /* Tags */
      .pv-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.375rem;
      }
      .pv-tag {
        background: var(--ink-100);
        color: var(--ink-700);
        border-radius: 20px;
        padding: 0.25rem 0.75rem;
        font-size: 0.75rem;
        font-weight: 500;
      }

      /* Documents */
      .pv-doc {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.625rem 0;
        border-bottom: 1px solid var(--ink-100);
        text-decoration: none;
        color: inherit;
        transition: background 0.1s;
      }
      .pv-doc:first-child {
        padding-top: 0;
      }
      .pv-doc:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }
      .pv-doc-icon {
        width: 38px;
        height: 38px;
        border-radius: 8px;
        background: var(--ink-100);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: var(--ink-600);
      }
      .pv-doc-info {
        min-width: 0;
        flex: 1;
      }
      .pv-doc-name {
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--ink-800);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .pv-doc-meta {
        font-size: 0.6875rem;
        color: var(--ink-500);
        margin-top: 0.1rem;
      }
      .pv-doc-dl {
        flex-shrink: 0;
        color: var(--ink-400);
        transition: color 0.15s;
        margin-inline-start: auto;
      }
      .pv-doc:hover .pv-doc-dl {
        color: var(--ink-700);
      }

      .pv-empty {
        font-size: 0.8125rem;
        color: var(--ink-500);
      }
    </style>
  </head>
  <body>
    <div id="sidebar"></div>

    <main class="dashboard-main">
      <!-- Loading -->
      <div id="pvLoading" class="loading-state" style="padding: 3rem 0">
        <span class="spinner"></span>
      </div>

      <!-- Error / not found -->
      <div
        id="pvError"
        class="hidden"
        style="padding: 3rem 0; text-align: center"
      >
        <p style="color: var(--ink-500); font-size: 0.9375rem">
          العقار غير موجود أو تم حذفه.
        </p>
        <a
          href="dashboard-properties.html"
          class="btn btn-ghost"
          style="margin-top: 1rem"
          >العودة للعقارات</a
        >
      </div>

      <!-- Content -->
      <div id="pvContent" class="hidden">
        <!-- Header -->
        <div class="pv-header">
          <div>
            <a href="dashboard-properties.html" class="pv-back">← العقارات</a>
            <h1 id="pvTitle">—</h1>
            <div class="pv-status-row" id="pvBadges"></div>
          </div>
          <div class="pv-header-actions">
            <a
              id="pvEditBtn"
              href="#"
              class="btn btn-primary"
              data-role-require="properties.edit"
            >
              <svg
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
                />
                <path
                  d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
                />
              </svg>
              تعديل
            </a>
          </div>
        </div>

        <!-- Gallery -->
        <div class="pv-gallery">
          <div class="pv-gallery-main" id="pvGalleryMain">
            <div class="pv-no-img">
              <svg
                width="36"
                height="36"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1"
              >
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <polyline points="21 15 16 10 5 21" />
              </svg>
              <span>لا توجد صور</span>
            </div>
          </div>
          <div class="pv-thumbs" id="pvThumbs"></div>
        </div>

        <!-- Two-column body -->
        <div class="pv-layout">
          <!-- LEFT: description + tags -->
          <div class="pv-main">
            <div class="pv-card" id="pvDescCard">
              <p class="pv-card-ttl">الوصف</p>
              <p class="pv-desc" id="pvDesc"></p>
            </div>
            <div class="pv-card hidden" id="pvTagsCard">
              <p class="pv-card-ttl">الوسوم</p>
              <div class="pv-tags" id="pvTags"></div>
            </div>
          </div>

          <!-- RIGHT: info + location + map + docs -->
          <aside class="pv-aside">
            <!-- Price & specs -->
            <div class="pv-card">
              <div id="pvPriceEl"></div>
              <div class="pv-specs" id="pvSpecs"></div>
            </div>

            <!-- Location -->
            <div class="pv-card hidden" id="pvLocCard">
              <p class="pv-card-ttl">المنطقة والموقع</p>
              <div class="pv-loc">
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                  <circle cx="12" cy="10" r="3" />
                </svg>
                <span id="pvLocation"></span>
              </div>
            </div>

            <!-- Map with boundary -->
            <div class="pv-card hidden" id="pvMapCard">
              <p class="pv-card-ttl">الخريطة وحدود الأرض</p>
              <div class="pv-map-wrap" id="pvMap"></div>
            </div>

            <!-- Documents -->
            <div class="pv-card">
              <p class="pv-card-ttl">المرفقات والوثائق</p>
              <div id="pvDocs"><span class="pv-empty">جارٍ التحميل…</span></div>
            </div>
          </aside>
        </div>
      </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
      import {
        initI18n,
        applyTranslations,
        onLangChange,
      } from "./assets/js/i18n.js";
      import {setupDashboard} from "./assets/js/dashboard-ui.js";
      import {getProperty, listPropertyDocs} from "./assets/js/firestore.js";
      import {
        priceHtml,
        statusLabel,
        typeLabel,
        categoryLabel,
        escapeHtml,
        localize,
        localizeTags,
        formatArea,
        formatDate,
        googleMapsEmbedUrl,
      } from "./assets/js/ui.js?v=2";

      initI18n();

      const id = new URLSearchParams(location.search).get("id");

      /* ── helpers ── */
      function docTypeLabel(type) {
        return {deed: "صك ملكية", plan: "مخطط", other: "مرفق"}[type] ?? "مرفق";
      }
      function fmtBytes(n) {
        if (!n) return "";
        if (n < 1024) return `${n} B`;
        if (n < 1_048_576) return `${(n / 1024).toFixed(1)} KB`;
        return `${(n / 1_048_576).toFixed(1)} MB`;
      }

      /* ── Gallery ── */
      function renderGallery(images) {
        const main = document.getElementById("pvGalleryMain");
        const thumbs = document.getElementById("pvThumbs");
        if (!images?.length) return;

        function show(i) {
          main.innerHTML = `<img src="${escapeHtml(images[i])}" alt="">`;
          thumbs
            .querySelectorAll(".pv-thumb")
            .forEach((el, j) => el.classList.toggle("active", j === i));
        }

        if (images.length === 1) {
          main.innerHTML = `<img src="${escapeHtml(images[0])}" alt="">`;
          return;
        }

        thumbs.innerHTML = images
          .map(
            (url, i) =>
              `<img class="pv-thumb${i === 0 ? " active" : ""}" src="${escapeHtml(url)}" data-i="${i}" loading="lazy" alt="">`,
          )
          .join("");

        thumbs.addEventListener("click", (e) => {
          const t = e.target.closest(".pv-thumb");
          if (t) show(Number(t.dataset.i));
        });

        show(0);
      }

      /* ── Map ── */
      function initMap(p) {
        const mapCard = document.getElementById("pvMapCard");
        const container = document.getElementById("pvMap");

        const hasBoundary = p.boundary?.geometry;
        const hasCoords = p.coordinates && Number.isFinite(p.coordinates.lat);
        const hasMapUrl = (p.mapUrl || "").trim();

        if (!hasBoundary && !hasCoords && !hasMapUrl) return;

        mapCard.classList.remove("hidden");

        if (hasBoundary || hasCoords) {
          const center = hasCoords
            ? [p.coordinates.lat, p.coordinates.lng]
            : [22.5, 57.5];

          const map = L.map(container, {
            center,
            zoom: hasCoords ? 14 : 6,
            zoomControl: true,
            attributionControl: false,
          });

          L.tileLayer(
            "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
            {maxZoom: 20},
          ).addTo(map);
          L.tileLayer(
            "https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
            {maxZoom: 20, pane: "overlayPane"},
          ).addTo(map);

          if (hasBoundary) {
            const layer = L.geoJSON(p.boundary, {
              style: {
                color: "#b8922a",
                weight: 2.5,
                fillColor: "#b8922a",
                fillOpacity: 0.2,
              },
            }).addTo(map);
            try {
              const b = layer.getBounds();
              if (b.isValid())
                map.fitBounds(b, {padding: [28, 28], maxZoom: 18});
            } catch {}
          } else {
            L.marker([p.coordinates.lat, p.coordinates.lng]).addTo(map);
          }
          return;
        }

        // Fallback: Google Maps embed
        const embedUrl = googleMapsEmbedUrl(hasMapUrl, p.coordinates);
        if (embedUrl) {
          container.innerHTML = `<iframe src="${escapeHtml(embedUrl)}" allowfullscreen loading="lazy"></iframe>`;
        }
      }

      /* ── Documents ── */
      function renderDocs(docs) {
        const el = document.getElementById("pvDocs");
        if (!docs.length) {
          el.innerHTML = '<span class="pv-empty">لا توجد مرفقات مضافة</span>';
          return;
        }
        el.innerHTML = docs
          .map(
            (d) => `
          <a class="pv-doc" href="${escapeHtml(d.fileUrl || "#")}" target="_blank" rel="noopener">
            <div class="pv-doc-icon">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
              </svg>
            </div>
            <div class="pv-doc-info">
              <div class="pv-doc-name">${escapeHtml(d.title || d.fileName || "—")}</div>
              <div class="pv-doc-meta">${escapeHtml(docTypeLabel(d.docType))}${d.fileSize ? " · " + fmtBytes(d.fileSize) : ""}${d.createdAt ? " · " + formatDate(d.createdAt) : ""}</div>
            </div>
            <svg class="pv-doc-dl" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </a>
        `,
          )
          .join("");
      }

      /* ── Render property ── */
      async function render(p) {
        document.title = `${localize(p.title) || "—"} · الملكية للإستثمار`;
        document.getElementById("pvTitle").textContent =
          localize(p.title) || "—";
        document.getElementById("pvEditBtn").href =
          `dashboard-property-edit.html?id=${encodeURIComponent(p.id)}`;

        // Badges
        document.getElementById("pvBadges").innerHTML = [
          `<span class="badge badge-${p.status}">${escapeHtml(statusLabel(p.status))}</span>`,
          p.type
            ? `<span class="badge badge-muted">${escapeHtml(typeLabel(p.type))}</span>`
            : "",
          p.category
            ? `<span class="badge badge-muted" style="font-size:.65rem;">${escapeHtml(categoryLabel(p.category))}</span>`
            : "",
          p.featured
            ? `<span class="badge" style="background:#fef3c7;color:#92400e;">مميز ★</span>`
            : "",
        ].join("");

        // Price
        const priceEl = document.getElementById("pvPriceEl");
        priceEl.innerHTML = Number.isFinite(p.price)
          ? `<div class="pv-price">${priceHtml(p.price)}</div>`
          : `<p class="pv-no-price">السعر غير محدد</p>`;

        // Specs
        const specs = [];
        if (p.areaSize)
          specs.push([
            "المساحة",
            formatArea(p.areaSize, p.areaUnit || p.unit || "m2"),
          ]);
        if (p.bedrooms > 0) specs.push(["الغرف", p.bedrooms]);
        if (p.bathrooms > 0) specs.push(["الحمامات", p.bathrooms]);
        const specsEl = document.getElementById("pvSpecs");
        if (specs.length) {
          specsEl.innerHTML = specs
            .map(
              ([lbl, val]) => `
            <div class="pv-spec">
              <div class="pv-spec-lbl">${lbl}</div>
              <div class="pv-spec-val">${escapeHtml(String(val))}</div>
            </div>
          `,
            )
            .join("");
        } else {
          specsEl.style.display = "none";
        }

        // Location
        const loc = localize(p.location);
        if (loc) {
          document.getElementById("pvLocCard").classList.remove("hidden");
          document.getElementById("pvLocation").textContent = loc;
        }

        // Description
        const desc = localize(p.description);
        const descCard = document.getElementById("pvDescCard");
        if (desc) {
          document.getElementById("pvDesc").textContent = desc;
        } else {
          descCard.style.display = "none";
        }

        // Tags
        const tags = localizeTags(p.tags);
        if (tags?.length) {
          document.getElementById("pvTagsCard").classList.remove("hidden");
          document.getElementById("pvTags").innerHTML = tags
            .map((tg) => `<span class="pv-tag">${escapeHtml(tg)}</span>`)
            .join("");
        }

        // Gallery
        renderGallery(p.images);

        // Map
        initMap(p);
      }

      /* ── Load ── */
      async function load() {
        if (!id) {
          document.getElementById("pvLoading").classList.add("hidden");
          document.getElementById("pvError").classList.remove("hidden");
          return;
        }
        try {
          const [p, docs] = await Promise.all([
            getProperty(id),
            listPropertyDocs(id).catch(() => []),
          ]);

          document.getElementById("pvLoading").classList.add("hidden");

          if (!p) {
            document.getElementById("pvError").classList.remove("hidden");
            return;
          }

          await render(p);
          renderDocs(docs);
          document.getElementById("pvContent").classList.remove("hidden");
        } catch (e) {
          document.getElementById("pvLoading").classList.add("hidden");
          document.getElementById("pvError").classList.remove("hidden");
          console.error(e);
        }
      }

      (async () => {
        const ctx = await setupDashboard("dashboard-properties.html");
        applyTranslations();
        const {applyRoleGuards} = await import("./assets/js/roles.js");
        applyRoleGuards(document.getElementById("pvContent"), ctx.role);
        load();
      })();

      onLangChange(() => {
        applyTranslations();
        location.reload();
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="assets/js/animations.js"></script>
  </body>
</html>
